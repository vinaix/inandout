<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>In&Out Security</title>

<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ------------------ THEME ------------------ */

:root{
--text:#1d1d1f;
--muted:#6e6e73;
--border:#e5e5e7;
--bg:#f5f5f7;
--card:#ffffff;
--accent:#0071e3;
--success:#34c759;
--glass:rgba(255,255,255,0.7);
}

/* ------------------ GLOBAL ------------------ */

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"SF Pro Display",system-ui,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* ------------------ NAVBAR ------------------ */

nav{
position:fixed;
top:0;
width:100%;
backdrop-filter:blur(14px);
background:var(--glass);
border-bottom:1px solid var(--border);
z-index:10;
}

.nav-inner{
max-width:1100px;
margin:auto;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-weight:600;
font-size:18px;
}

.nav-actions{
display:flex;
gap:16px;
align-items:center;
}

.nav-actions button{
background:none;
border:none;
color:var(--accent);
font-weight:500;
cursor:pointer;
}

.logout{
text-decoration:none;
color:var(--muted);
font-size:14px;
}

/* ------------------ PAGE ------------------ */

.container{
max-width:1100px;
margin:auto;
padding:100px 20px 40px;
}

.header{
margin-bottom:30px;
}

.header h1{
font-size:28px;
margin-bottom:6px;
}

.header p{
color:var(--muted);
font-size:14px;
}

/* ------------------ GRID ------------------ */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

/* ------------------ CARD ------------------ */

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:20px;
display:flex;
gap:16px;
align-items:flex-start;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
transition:transform .2s ease;
}

.card:hover{
transform:translateY(-3px);
}

/* ------------------ AVATAR ------------------ */

.avatar{
width:56px;
height:56px;
border-radius:50%;
overflow:hidden;
background:#e5e5ea;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:18px;
color:#555;
flex-shrink:0;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

/* ------------------ INFO ------------------ */

.info{
flex:1;
}

.name{
font-weight:600;
font-size:16px;
}

.room{
font-size:13px;
color:var(--muted);
margin-top:2px;
}

.reason{
margin-top:10px;
font-size:14px;
background:#f2f2f7;
padding:8px 10px;
border-radius:8px;
}

/* ------------------ STATUS ------------------ */

.status{
margin-top:10px;
font-size:12px;
background:var(--success);
color:white;
padding:5px 10px;
border-radius:20px;
width:max-content;
font-weight:500;
}

/* ------------------ EMPTY ------------------ */

.empty{
text-align:center;
color:var(--muted);
margin-top:80px;
font-size:15px;
}

/* ------------------ MOBILE ------------------ */

@media (max-width:600px){

.header h1{
font-size:22px;
}

.container{
padding:90px 16px 30px;
}

.card{
padding:16px;
}

}

</style>
</head>

<body>

<!-- NAV -->

<nav>

<div class="nav-inner">

<div class="logo">
In&Out Security
</div>

<div class="nav-actions">

<button onclick="loadApproved()">Refresh</button>

<a href="/logout" class="logout">
Logout
</a>

</div>

</div>

</nav>

<!-- PAGE -->

<div class="container">

<div class="header">

<h1>Approved Leave</h1>

<p>
Students currently permitted to leave the hostel
</p>

</div>

<div id="approvedList" class="grid"></div>

<div id="empty" class="empty" style="display:none">
No approved students right now
</div>

</div>


<script>

/* ---------------- LOAD APPROVED ---------------- */

async function loadApproved(){

const res = await fetch("/api/approved")
const data = await res.json()

const grid = document.getElementById("approvedList")
const empty = document.getElementById("empty")

grid.innerHTML=""

if(data.length===0){
empty.style.display="block"
return
}

empty.style.display="none"

data.forEach(student=>{

let avatar

if(student.photo){

let src = student.photo

if(!src.startsWith("data:image")){
src = "data:image/png;base64," + src
}

avatar=`<img src="${src}">`

}else{

const initial = (student.name || student.username)[0].toUpperCase()

avatar=`${initial}`

}

const card=`

<div class="card">

<div class="avatar">
${avatar}
</div>

<div class="info">

<div class="name">
${student.name || student.username}
</div>

<div class="room">
Room ${student.room}
</div>

<div class="reason">
${student.reason}
</div>

<div class="status">
APPROVED
</div>

</div>

</div>

`

grid.innerHTML+=card

})

}

/* INIT */

loadApproved()

/* AUTO REFRESH */

setInterval(loadApproved,5000)

</script>

</body>
</html>
