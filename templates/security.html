<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Dashboard | Hostel Access</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, sans-serif;
}

body{
background:#f5f7fa;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#0f172a;
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:20px;
font-weight:600;
margin-bottom:40px;
}

.nav a{
display:block;
padding:12px;
margin-bottom:10px;
border-radius:8px;
text-decoration:none;
color:#cbd5e1;
}

.nav a:hover{
background:#1e293b;
color:white;
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
font-size:24px;
color:#1e293b;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:24px;
}

/* STUDENT CARD */

.card{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
display:flex;
gap:16px;
align-items:center;
border-left:6px solid #22c55e;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
overflow:hidden;
background:#e2e8f0;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:20px;
color:#475569;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
flex:1;
}

.name{
font-weight:600;
font-size:16px;
color:#0f172a;
}

.room{
font-size:14px;
color:#64748b;
margin-top:4px;
}

.reason{
margin-top:10px;
font-size:14px;
color:#334155;
background:#f1f5f9;
padding:8px;
border-radius:6px;
}

.status{
font-size:12px;
color:white;
background:#22c55e;
padding:5px 10px;
border-radius:20px;
width:max-content;
margin-top:8px;
}

.refresh{
background:#0f172a;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

.refresh:hover{
background:#1e293b;
}

</style>
</head>


<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Hostel Security
</div>

<div class="nav">
<a href="#">Approved Students</a>
<a href="#" onclick="loadApproved()">Refresh</a>
<a href="/logout">Logout</a>
</div>

</div>


<!-- MAIN -->

<div class="main">

<div class="header">

<h1>Approved Leave Students</h1>

<button class="refresh" onclick="loadApproved()">
Refresh
</button>

</div>

<div class="grid" id="approvedList"></div>

</div>


<script>

async function loadApproved(){

const res = await fetch("/api/approved")
const data = await res.json()

const container = document.getElementById("approvedList")
container.innerHTML=""

data.forEach(student=>{

let avatar

if(student.photo){

avatar=`<img src="data:image/png;base64,${student.photo}">`

}else{

const initials = student.name ? student.name.charAt(0).toUpperCase() : "S"

avatar=`${initials}`

}

const card=`

<div class="card">

<div class="avatar">

${avatar}

</div>

<div class="info">

<div class="name">

${student.name || student.username}

</div>

<div class="room">

Room : ${student.room}

</div>

<div class="reason">

${student.reason}

</div>

<div class="status">

APPROVED

</div>

</div>

</div>

`

container.innerHTML+=card

})

}

loadApproved()

setInterval(loadApproved,5000)

</script>

</body>
</html>
