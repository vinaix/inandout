<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>In&Out – Warden Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>

/* ---------- COLORS ---------- */

:root{
--text:#1d1d1f;
--muted:#6e6e73;
--border:#e5e5e7;

--primary:#0071e3;
--primary-hover:#0062c7;

--bg:#f5f5f7;
--card:#ffffff;

--glass:rgba(255,255,255,0.7);
}

/* ---------- GLOBAL ---------- */

*{
box-sizing:border-box
}

body{
margin:0;
font-family:"Google Sans",system-ui,sans-serif;
background:var(--bg);
color:var(--text);
}

/* ---------- NAVBAR ---------- */

nav{
position:fixed;
top:0;
width:100%;
backdrop-filter:blur(14px);
background:var(--glass);
border-bottom:1px solid var(--border);
z-index:100;
}

.nav-inner{
max-width:1200px;
margin:auto;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

nav strong{
font-size:1.3rem;
}

/* ---------- LAYOUT ---------- */

.layout{
display:flex;
padding-top:70px;
min-height:100vh;
}

.sidebar{
width:230px;
border-right:1px solid var(--border);
padding:30px 20px;
}

.sidebar div{
margin-bottom:14px;
cursor:pointer;
color:var(--muted);
font-size:15px;
}

.sidebar div:hover{
color:var(--primary);
}

.main{
flex:1;
padding:40px;
}

/* ---------- CARDS ---------- */

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:24px;
box-shadow:0 8px 24px rgba(0,0,0,0.06);
margin-bottom:24px;
overflow-x:auto;
}

/* ---------- GRID ---------- */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.stat{
font-size:28px;
margin-top:10px;
}

/* ---------- TABLE ---------- */

table{
width:100%;
border-collapse:collapse;
min-width:600px;
}

th{
text-align:left;
font-size:13px;
color:var(--muted);
padding:10px;
border-bottom:1px solid var(--border);
}

td{
padding:12px;
border-bottom:1px solid #f0f0f0;
}

/* ---------- BUTTON ---------- */

button{
background:var(--primary);
color:white;
border:none;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:var(--primary-hover);
}

/* ---------- INPUT ---------- */

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid var(--border);
}

/* ---------- FORM GRID ---------- */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

/* ---------- HIDE ---------- */

.hidden{
display:none;
}

/* ---------- TABLET ---------- */

@media(max-width:900px){

.layout{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow-x:auto;
gap:20px;
border-right:none;
border-bottom:1px solid var(--border);
padding:15px 20px;
}

.sidebar div{
margin:0;
white-space:nowrap;
}

.main{
padding:20px;
}

.grid{
grid-template-columns:repeat(2,1fr);
}

}

/* ---------- MOBILE ---------- */

@media(max-width:600px){

.grid{
grid-template-columns:1fr;
}

.form-grid{
grid-template-columns:1fr;
}

button{
width:100%;
}

}

</style>

</head>

<body>

<nav>
<div class="nav-inner">
<strong>In&Out</strong>
<span>Hostel Warden Panel</span>
</div>
</nav>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div onclick="showPage('dashboard')">Dashboard</div>
<div onclick="showPage('students')">Students</div>
<div onclick="showPage('rooms')">Rooms</div>
<div onclick="showPage('security')">Security Staff</div>
<div onclick="showPage('requests')">Leave Requests</div>

<br>
<a href="/logout">Logout</a>

</div>

<!-- MAIN -->

<div class="main">

<!-- DASHBOARD -->

<div id="dashboardPage">

<h2>Dashboard</h2>

<div class="grid">

<div class="card">
Students
<div id="studentCount" class="stat">0</div>
</div>

<div class="card">
Rooms
<div id="roomCount" class="stat">0</div>
</div>

<div class="card">
Pending Requests
<div id="requestCount" class="stat">0</div>
</div>

</div>

</div>

<!-- STUDENTS -->

<div id="studentsPage" class="hidden">

<h2>Students</h2>

<div class="card">

<form id="studentForm" class="form-grid">

<input name="username" placeholder="Username">
<input name="password" placeholder="Password">

<input name="name" placeholder="Full Name">
<input name="room" placeholder="Room">

<select name="bed">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>E</option>
</select>

<input type="file" id="photoFile">

<input type="hidden" name="photo" id="photoBase64">

<button>Create Student</button>

</form>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Room</th>
<th>Bed</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentsTable"></tbody>

</table>

</div>

</div>

<!-- ROOMS -->

<div id="roomsPage" class="hidden">

<h2>Create Room</h2>

<div class="card">

<form id="roomForm" class="form-grid">

<input name="room_number" placeholder="Room">

<input name="bedA" placeholder="Bed A">
<input name="bedB" placeholder="Bed B">
<input name="bedC" placeholder="Bed C">
<input name="bedD" placeholder="Bed D">
<input name="bedE" placeholder="Bed E">

<button>Create Room</button>

</form>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Room</th>
<th>A</th>
<th>B</th>
<th>C</th>
<th>D</th>
<th>E</th>
</tr>
</thead>

<tbody id="roomsTable"></tbody>

</table>

</div>

</div>

<!-- SECURITY STAFF -->

<div id="securityPage" class="hidden">

<h2>Security Staff</h2>

<div class="card">

<form id="securityForm" class="form-grid">

<input name="username" placeholder="Username">
<input name="password" placeholder="Password">

<input name="name" placeholder="Full Name">

<select name="shift">
<option>Morning</option>
<option>Evening</option>
<option>Night</option>
</select>

<button>Add Security</button>

</form>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Name</th>
<th>Username</th>
<th>Shift</th>
</tr>
</thead>

<tbody id="securityTable"></tbody>

</table>

</div>

</div>

<!-- REQUESTS -->

<div id="requestsPage" class="hidden">

<h2>Leave Requests</h2>

<div class="card">

<table>

<thead>
<tr>
<th>Student</th>
<th>Room</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="requestsTable"></tbody>

</table>

</div>

</div>

</div>
</div>

<script>

/* PAGE SWITCH */

function showPage(page){

document.querySelectorAll("[id$='Page']").forEach(p=>p.classList.add("hidden"))

document.getElementById(page+"Page").classList.remove("hidden")

}

/* IMAGE BASE64 */

photoFile.onchange=e=>{
const reader=new FileReader()
reader.onload=()=>photoBase64.value=reader.result.split(",")[1]
reader.readAsDataURL(e.target.files[0])
}

/* LOAD STUDENTS */

async function loadStudents(){

const res=await fetch("/api/students")
const data=await res.json()

studentCount.innerText=data.length

studentsTable.innerHTML=""

data.forEach(s=>{

studentsTable.innerHTML+=`

<tr>

<td><img src="data:image/png;base64,${s.photo||''}" width="40"></td>

<td>${s.name}</td>
<td>${s.room}</td>
<td>${s.bed}</td>

<td>
<button onclick="deleteStudent('${s.username}')">Delete</button>
</td>

</tr>

`

})

}

/* DELETE STUDENT */

async function deleteStudent(username){

if(!confirm("Delete student?")) return

await fetch("/api/delete_student/"+username,{method:"DELETE"})

loadStudents()

}

/* LOAD ROOMS */

async function loadRooms(){

const res=await fetch("/api/rooms")
const data=await res.json()

roomCount.innerText=data.length

roomsTable.innerHTML=""

data.forEach(r=>{

roomsTable.innerHTML+=`

<tr>
<td>${r.room}</td>
<td>${r.A||""}</td>
<td>${r.B||""}</td>
<td>${r.C||""}</td>
<td>${r.D||""}</td>
<td>${r.E||""}</td>
</tr>

`

})

}

/* LOAD SECURITY */

async function loadSecurity(){

const res=await fetch("/api/security_staff")
const data=await res.json()

securityTable.innerHTML=""

data.forEach(s=>{

securityTable.innerHTML+=`

<tr>

<td>${s.name}</td>
<td>${s.username}</td>
<td>${s.shift}</td>

</tr>

`

})

}

/* LOAD REQUESTS */

async function loadRequests(){

const res=await fetch("/api/requests")
const data=await res.json()

requestCount.innerText=data.filter(r=>r.status=="pending").length

requestsTable.innerHTML=""

data.forEach(r=>{

requestsTable.innerHTML+=`

<tr>

<td>${r.student}</td>
<td>${r.room}</td>
<td>${r.reason}</td>
<td>${r.status}</td>

<td>

<button onclick="approve('${r.id}')">Approve</button>
<button onclick="reject('${r.id}')">Reject</button>

</td>

</tr>

`

})

}

async function approve(id){

await fetch("/api/approve/"+id,{method:"POST"})
loadRequests()

}

async function reject(id){

await fetch("/api/reject/"+id,{method:"POST"})
loadRequests()

}

/* FORMS */

studentForm.onsubmit=async e=>{
e.preventDefault()
await fetch("/api/add_student",{method:"POST",body:new FormData(studentForm)})
studentForm.reset()
loadStudents()
}

roomForm.onsubmit=async e=>{
e.preventDefault()

const data=Object.fromEntries(new FormData(roomForm))

await fetch("/api/create_room",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

roomForm.reset()
loadRooms()
}

securityForm.onsubmit=async e=>{
e.preventDefault()

await fetch("/api/add_security",{method:"POST",body:new FormData(securityForm)})

securityForm.reset()

loadSecurity()

}

/* INITIAL LOAD */

loadStudents()
loadRooms()
loadSecurity()
loadRequests()

setInterval(loadRequests,4000)

</script>

</body>
</html>
