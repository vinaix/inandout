```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Google Sans",Arial;
background:#f1f5f9;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#0f172a;
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:20px;
font-weight:600;
margin-bottom:40px;
}

.menu button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
background:#1e293b;
color:white;
border-radius:8px;
cursor:pointer;
text-align:left;
font-size:14px;
}

.menu button:hover{
background:#2563eb;
}

.logout{
margin-top:auto;
color:#94a3b8;
text-decoration:none;
font-size:14px;
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

/* CARD */

.card{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.06);
margin-bottom:30px;
}

h2{
margin-top:0;
}

/* PROFILE */

.profile-box{
display:flex;
gap:30px;
align-items:center;
}

.profile-img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:3px solid #e5e7eb;
background:#e2e8f0;
}

.profile-info{
flex:1;
}

.profile-info label{
font-size:13px;
color:#64748b;
display:block;
margin-top:10px;
}

.profile-info input{
width:100%;
padding:10px;
border:1px solid #e2e8f0;
border-radius:6px;
margin-top:5px;
font-family:"Google Sans";
}

/* BUTTON */

.btn{
margin-top:15px;
background:#2563eb;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.btn:hover{
background:#1d4ed8;
}

/* TEXTAREA */

textarea{
width:100%;
padding:10px;
border:1px solid #e2e8f0;
border-radius:6px;
font-family:"Google Sans";
resize:none;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #e5e7eb;
text-align:left;
font-size:14px;
}

th{
color:#64748b;
font-weight:500;
}

.status-approved{
color:green;
font-weight:500;
}

.status-pending{
color:orange;
font-weight:500;
}

.status-rejected{
color:red;
font-weight:500;
}

/* SECTIONS */

.section{
display:none;
}

.section.active{
display:block;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">Converse Labs</div>

<div class="menu">

<button onclick="showSection('profile')">Edit Profile</button>

<button onclick="showSection('request')">Send Request</button>

<button onclick="showSection('status')">Request Status</button>

<button onclick="showSection('room')">Room Info</button>

</div>

<a href="/logout" class="logout">Logout</a>

</div>


<!-- MAIN CONTENT -->

<div class="main">

<!-- PROFILE -->

<div id="profile" class="card section active">

<h2>Edit Profile</h2>

<div class="profile-box">

<img id="photoPreview" class="profile-img">

<div class="profile-info">

<label>Name</label>
<input id="name">

<label>Upload Photo</label>
<input type="file" id="photo">

<button class="btn" onclick="updateProfile()">Update Profile</button>

</div>

</div>

</div>


<!-- LEAVE REQUEST -->

<div id="request" class="card section">

<h2>Leave Request</h2>

<p style="color:#64748b;font-size:14px">
Submit a request when leaving the hostel.
</p>

<textarea id="reason" rows="4" placeholder="Enter reason"></textarea>

<button class="btn" onclick="sendRequest()">Submit Request</button>

</div>


<!-- REQUEST STATUS -->

<div id="status" class="card section">

<h2>My Requests</h2>

<table>

<thead>

<tr>
<th>Reason</th>
<th>Status</th>
<th>Room</th>
<th>Date</th>
</tr>

</thead>

<tbody id="requestTable"></tbody>

</table>

</div>


<!-- ROOM INFO -->

<div id="room" class="card section">

<h2>Room Information</h2>

<p><b>Room Number:</b> <span id="roomNo"></span></p>

</div>

</div>


<script>

let currentUser=""
let currentRoom=""

/* SWITCH SECTIONS */

function showSection(id){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}


/* LOAD USER DATA */

async function loadUser(){

const res = await fetch("/api/me",{credentials:"same-origin"})

if(!res.ok) return

const data = await res.json()

currentUser = data.username
currentRoom = data.room

document.getElementById("name").value = data.name
document.getElementById("roomNo").innerText = data.room

if(data.photo){

let photo = data.photo

/* fix missing base64 prefix */

if(!photo.startsWith("data:image")){
photo = "data:image/png;base64," + photo
}

document.getElementById("photoPreview").src = photo

}

loadRequests()

}


/* UPDATE PROFILE */

async function updateProfile(){

const name = document.getElementById("name").value
const file = document.getElementById("photo").files[0]

let base64=""

if(file){

const reader = new FileReader()

reader.onload = async function(){

base64 = reader.result

await sendProfile(name,base64)

}

reader.readAsDataURL(file)

}else{

await sendProfile(name,null)

}

}


async function sendProfile(name,photo){

const form = new FormData()

form.append("name",name)

if(photo) form.append("photo",photo)

await fetch("/api/update_profile",{
method:"POST",
body:form,
credentials:"same-origin"
})

alert("Profile updated")

}


/* SEND REQUEST */

async function sendRequest(){

const reason = document.getElementById("reason").value.trim()

if(!reason){
alert("Enter reason")
return
}

await fetch("/api/request",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

student:currentUser,
room:currentRoom,
reason:reason

}),

credentials:"same-origin"

})

alert("Request submitted")

document.getElementById("reason").value=""

loadRequests()

}


/* LOAD REQUESTS */

async function loadRequests(){

const res = await fetch("/api/my_requests",{credentials:"same-origin"})

if(!res.ok) return

const data = await res.json()

const table = document.getElementById("requestTable")

table.innerHTML=""

if(data.length===0){

table.innerHTML="<tr><td colspan='4'>No requests yet</td></tr>"
return

}

data.forEach(r=>{

table.innerHTML += `
<tr>
<td>${r.reason}</td>
<td class="status-${r.status}">${r.status}</td>
<td>${r.room}</td>
<td>${new Date(r.created).toLocaleDateString()}</td>
</tr>
`

})

}


/* INIT */

window.onload = loadUser

</script>

</body>
</html>
```
