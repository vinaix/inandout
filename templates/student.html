<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>In&Out – Student Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>

/* ---------- THEME ---------- */

:root{
--text:#1d1d1f;
--muted:#6e6e73;
--border:#e5e5e7;

--primary:#0071e3;
--primary-hover:#0062c7;

--bg:#f5f5f7;
--card:#ffffff;

--success:#34c759;
--pending:#ff9f0a;
--rejected:#ff3b30;

--glass:rgba(255,255,255,0.7);
}

/* ---------- GLOBAL ---------- */

*{box-sizing:border-box}

body{
margin:0;
font-family:"Google Sans",system-ui,sans-serif;
background:var(--bg);
color:var(--text);
}

/* ---------- NAV ---------- */

nav{
position:fixed;
top:0;
width:100%;
backdrop-filter:blur(14px);
background:var(--glass);
border-bottom:1px solid var(--border);
}

.nav-inner{
max-width:1100px;
margin:auto;
padding:16px 24px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav strong{
font-size:1.3rem;
}

/* ---------- MAIN ---------- */

.container{
max-width:900px;
margin:auto;
padding:100px 20px 40px;
}

/* ---------- CARDS ---------- */

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.06);
margin-bottom:24px;
}

/* ---------- PROFILE ---------- */

.profile{
display:flex;
align-items:center;
gap:20px;
}

.profile img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
}

.profile h2{
margin:0;
}

.profile span{
color:var(--muted);
font-size:14px;
}

/* ---------- BUTTON ---------- */

button{
background:var(--primary);
color:white;
border:none;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
font-weight:500;
}

button:hover{
background:var(--primary-hover);
}

/* ---------- INPUT ---------- */

textarea,input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid var(--border);
font-family:"Google Sans";
}

textarea:focus,input:focus{
outline:none;
border-color:var(--primary);
}

/* ---------- TABLE ---------- */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
text-align:left;
font-size:13px;
color:var(--muted);
border-bottom:1px solid var(--border);
padding:10px;
}

td{
padding:12px;
border-bottom:1px solid #f0f0f0;
}

.status-pending{color:var(--pending)}
.status-approved{color:var(--success)}
.status-rejected{color:var(--rejected)}

.hidden{display:none}

</style>
</head>

<body>

<nav>
<div class="nav-inner">

<strong>In&Out</strong>

<div>
<span id="username"></span>
<a href="/logout" style="margin-left:20px">Logout</a>
</div>

</div>
</nav>

<div class="container">

<!-- PROFILE -->

<div class="card">

<div class="profile">

<img id="photo">

<div>
<h2 id="name"></h2>
<span>Room <span id="room"></span></span>
</div>

</div>

</div>

<!-- LEAVE REQUEST -->

<div class="card">

<h3>Leave Permission</h3>

<p style="color:var(--muted)">
Request permission when leaving the hostel.
</p>

<button onclick="toggleForm()">Request Permission</button>

<div id="form" class="hidden">

<textarea id="reason" rows="4" placeholder="Reason for leaving"></textarea>

<button onclick="submitRequest()">Submit</button>

</div>

</div>

<!-- REQUESTS -->

<div class="card">

<h3>My Requests</h3>

<table>

<thead>
<tr>
<th>Reason</th>
<th>Status</th>
<th>Room</th>
<th>Date</th>
</tr>
</thead>

<tbody id="tableBody">
<tr><td colspan="4">No requests</td></tr>
</tbody>

</table>

</div>

</div>

<script>

let currentUser=""
let currentRoom=""

/* LOAD USER */

async function loadUser(){

const res=await fetch("/api/me")

const data=await res.json()

currentUser=data.username
currentRoom=data.room

username.innerText=data.username
name.innerText=data.name
room.innerText=data.room

if(data.photo){
photo.src="data:image/png;base64,"+data.photo
}

loadRequests()

}

/* TOGGLE FORM */

function toggleForm(){

form.classList.toggle("hidden")

}

/* SUBMIT REQUEST */

async function submitRequest(){

const reason=reasonInput.value.trim()

if(!reason){
alert("Enter reason")
return
}

await fetch("/api/request",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
student:currentUser,
room:currentRoom,
reason:reason
})

})

reasonInput.value=""

loadRequests()

}

/* LOAD REQUESTS */

async function loadRequests(){

const res=await fetch("/api/my_requests")

const data=await res.json()

tableBody.innerHTML=""

if(data.length===0){

tableBody.innerHTML="<tr><td colspan='4'>No requests</td></tr>"

return

}

data.forEach(r=>{

tableBody.innerHTML+=`

<tr>

<td>${r.reason}</td>

<td class="status-${r.status}">
${r.status}
</td>

<td>${r.room}</td>

<td>${new Date(r.created).toLocaleDateString()}</td>

</tr>

`

})

}

/* INIT */

window.onload=loadUser

</script>

</body>
</html>
