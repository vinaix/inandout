<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Google Sans";
background:#f5f7fa;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:white;
border-right:1px solid #e5e5e5;
padding:30px 20px;
}

.logo{
font-size:18px;
font-weight:600;
margin-bottom:30px;
}

.menu button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
background:#f1f3f4;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.menu button:hover{
background:#e8f0fe;
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

.card{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
margin-bottom:30px;
}

h2{
margin-top:0;
}

/* PROFILE */

.profile-img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

/* INPUTS */

input, textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:12px;
font-family:"Google Sans";
}

textarea{
resize:none;
}

/* BUTTON */

.btn{
background:#1a73e8;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

.btn:hover{
background:#1669c1;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

.status-approved{color:green;}
.status-pending{color:orange;}
.status-rejected{color:red;}

.section{
display:none;
}

.active{
display:block;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">Converse Labs</div>

<div class="menu">

<button onclick="showSection('profile')">Edit Profile</button>

<button onclick="showSection('request')">Send Request</button>

<button onclick="showSection('status')">Request Status</button>

<button onclick="showSection('room')">Room Info</button>

<a href="/logout">Logout</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- PROFILE -->

<div id="profile" class="card section active">

<h2>Edit Profile</h2>

<img id="photoPreview" class="profile-img">

<input id="name" placeholder="Name">

<input type="file" id="photo">

<button class="btn" onclick="updateProfile()">Update Profile</button>

</div>

<!-- REQUEST -->

<div id="request" class="card section">

<h2>Leave Request</h2>

<textarea id="reason" rows="4" placeholder="Reason"></textarea>

<button class="btn" onclick="sendRequest()">Submit</button>

</div>

<!-- STATUS -->

<div id="status" class="card section">

<h2>My Requests</h2>

<table>

<thead>
<tr>
<th>Reason</th>
<th>Status</th>
<th>Room</th>
<th>Date</th>
</tr>
</thead>

<tbody id="requestTable"></tbody>

</table>

</div>

<!-- ROOM -->

<div id="room" class="card section">

<h2>Room Information</h2>

<p><b>Room:</b> <span id="roomNo"></span></p>

</div>

</div>

<script>

let currentUser=""
let currentRoom=""

/* SWITCH SECTIONS */

function showSection(id){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

/* LOAD USER */

async function loadUser(){

const res=await fetch("/api/me",{credentials:"same-origin"})

const data=await res.json()

currentUser=data.username
currentRoom=data.room

document.getElementById("name").value=data.name
document.getElementById("roomNo").innerText=data.room

if(data.photo){
document.getElementById("photoPreview").src=data.photo
}

loadRequests()

}

/* UPDATE PROFILE */

async function updateProfile(){

const name=document.getElementById("name").value
const file=document.getElementById("photo").files[0]

let base64=""

if(file){

const reader=new FileReader()

reader.onload=async function(){

base64=reader.result

await sendProfile(name,base64)

}

reader.readAsDataURL(file)

}else{

await sendProfile(name,null)

}

}

async function sendProfile(name,photo){

const form=new FormData()

form.append("name",name)

if(photo) form.append("photo",photo)

await fetch("/api/update_profile",{
method:"POST",
body:form,
credentials:"same-origin"
})

alert("Profile Updated")

}

/* SEND REQUEST */

async function sendRequest(){

const reason=document.getElementById("reason").value

await fetch("/api/request",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

student:currentUser,
room:currentRoom,
reason:reason

}),

credentials:"same-origin"

})

alert("Request Sent")

loadRequests()

}

/* LOAD REQUESTS */

async function loadRequests(){

const res=await fetch("/api/my_requests",{credentials:"same-origin"})

const data=await res.json()

const table=document.getElementById("requestTable")

table.innerHTML=""

data.forEach(r=>{

table.innerHTML+=`

<tr>

<td>${r.reason}</td>

<td class="status-${r.status}">${r.status}</td>

<td>${r.room}</td>

<td>${new Date(r.created).toLocaleDateString()}</td>

</tr>

`

})

}

window.onload=loadUser

</script>

</body>
</html>
